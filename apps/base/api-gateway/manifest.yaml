apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: ecommerce
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: nguyenle1002/api-gateway:dev
          imagePullPolicy: Always
          ports:
            - containerPort: 7999
          envFrom:
            - configMapRef:
                name: ecommerce-shared-config
            - secretRef:
                name: ecommerce-shared-secret
          env:
            - name: SERVER_PORT
              value: "7999"
            - name: CORS_ALLOWED_ORIGINS
              value: "*"
            - name: JWT_EXPIRATION
              value: "3600000"
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 7999
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 7999
            initialDelaySeconds: 30
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: ecommerce
spec:
  selector:
    app: api-gateway
  ports:
    - name: http
      port: 7999
      targetPort: 7999
      nodePort: 30099
  type: NodePort

